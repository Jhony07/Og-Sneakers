<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/assets/css/auth.css" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>Resetar Senha | OG Sneakers</title>
</head>

<body>
  <header class="auth-header">
    <a href="/index.html" class="logo-container">
      <img src="../assets/img/Og Sneakers - logo.png" alt="Og Sneakers logo" class="logo" />
    </a>
  </header>

  <main class="auth-main">
    <div class="auth-container">
      <div class="card">

        <h2>Esqueceu a senha?</h2>
        <p>Enviaremos um link para redefinição de senha para o e-mail abaixo.</p>
        <form id="login-form" class="auth-form">
          <input type="email" id="email" placeholder="E-mail*">
          <p class="error-msg" id="login-email-error"
            style="display: none; color: red; font-size: 12px;"></p>

          <button type="submit" class="primary-btn">Enviar link de redefinição de senha</button>
        </form>

        <div class="auth-footer">
          <p>Usar um e-mail diferente? <a href="/pages/login.html">Mudar</a></p>
        </div>


      </div>
    </div>
  </main>

  <script src="../assets/js/auth.js"></script>
</body>

</html>
