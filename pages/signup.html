<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/assets/css/auth.css" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>OG Sneakers</title>
</head>

<body>
  <header class="auth-header">
    <a href="#" class="logo-container">
      <img src="../assets/img/Og Sneakers - logo.png" alt="Og Sneakers logo" class="logo" />
    </a>
  </header>

  <main class="auth-main">

    <div class="auth-container">
      <div class="card">

        <div class="auth-tabs">
          <button type="button" class="tab-active" data-href="#">Criar Conta</button>
          <button type="button" class="tab" data-href="login.html">Entrar</button>
        </div>

        <h2>Criar Conta</h2>
        <form action="" class="auth-form">
          <input type="text" placeholder="Name*">
          <input type="text" placeholder="Sobrenome*">
          <input type="email" placeholder="E-mail*">
          <div class="password-field">
            <input type="password" placeholder="Senha*" id="password">
            <i class="bi bi-eye-slash toggle-password"></i>
          </div>
          <p class="password-hint">Pelo menos 6 a 8 caracteres, 1 letra maiúscula, 1 número e 1
            símbolo.
          </p>

          <label class="terms">
            <input type="checkbox" name="" id="">
            Li e concordo com os <a href="#">Termos de Uso</a> and <a href="#">
              Política de Privacidade.</a>
          </label>

          <button type="submit" class="primary-btn">Criar Conta</button>
        </form>

        <div class="auth-divider">
          <span>OU</span>
        </div>

        <p class="auth-social-text">Cadastre-se com</p>

        <div class="auth-social">
          <a href="#" class="social-btn" aria-label="Sign up with Google">
            <img src="../assets/img/google.png" alt="Google">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Apple">
            <img src="../assets/img/apple.png" alt="Apple">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Facebook">
            <img src="../assets/img/facebook.png" alt="Facebook">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Email">
            <img src="../assets/img/email.png" alt="Email">
          </a>
        </div>

        <div class="auth-footer">
          <p>Já tem uma conta? <a href="/pages/login.html">Entrar</a></p>
        </div>

      </div>
    </div>
  </main>

  <script src="../assets/js/auth.js"></script>
</body>

</html>
