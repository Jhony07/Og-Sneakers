<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/Login.css" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>OG Sneakers</title>
</head>

<body>
  <header class="auth-header">
    <a href="#" class="logo-container">
      <img src="./img/Og Sneakers - logo PNG.png" alt="Og Sneakers logo" class="logo" />
    </a>
  </header>

  <main class="auth-main">

    <div class="auth-container">
      <div class="card">

        <div class="auth-tabs">
          <button type="button" class="tab" data-href="SignUp.html">Criar Conta</button>
          <button type="button" class="tab-active" data-href="#">Entrar</button>
        </div>

        <h2>Entrar</h2>
        <form action="" class="auth-form">
          <input type="email" placeholder="E-mail*">
          <div class="password-field">
            <input type="password" placeholder="Senha*" id="password">
            <i class="bi bi-eye-slash toggle-password"></i>
          </div>
          <a href="#" class="forgot-password">Esqueceu a senha?</a>

          <button type="submit" class="primary-btn">Entrar</button>
        </form>

        <div class="auth-divider">
          <span>OU</span>
        </div>

        <p class="auth-social-text">Entrar com</p>

        <div class="auth-social">
          <a href="#" class="social-btn" aria-label="Sign up with Google">
            <img src="./img/google.png" alt="Google">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Apple">
            <img src="./img/apple.png" alt="Apple">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Facebook">
            <img src="./img/facebook.png" alt="Facebook">
          </a>

          <a href="#" class="social-btn" aria-label="Sign up with Email">
            <img src="./img/email.png" alt="Email">
          </a>
        </div>

        <div class="auth-footer">
          <p>Already have an account? <a href="#">Log In</a></p>
        </div>


      </div>
    </div>
  </main>

  <script>
    const tabs = document.querySelectorAll('.auth-tabs button');
    const authTabs = document.querySelector('.auth-tabs');

    function updateDivider() {
      const activeTab = document.querySelector('.tab-active');
      const tabIndex = Array.from(tabs).indexOf(activeTab);
      authTabs.style.setProperty('--divider-transform', `translateX(${tabIndex * 100}%)`);
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', function () {
        const href = this.getAttribute('data-href');
        tabs.forEach(t => t.classList.remove('tab-active'));
        this.classList.add('tab-active');
        updateDivider();

        if (href && href !== '#') {
          window.location.href = href;
        }
      });
    });

    updateDivider();

    const togglePassword = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });
  </script>
</body>

</html>
